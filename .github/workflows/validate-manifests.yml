name: Validate Manifests

on:
  push:
    branches: [main]
    paths:
      - 'envs/**'
      - 'infrastructure/**'
      - 'argocd-appsets/**'
      - 'bootstrap/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'envs/**'
      - 'infrastructure/**'
      - 'argocd-appsets/**'
      - 'bootstrap/**'
      - '.github/workflows/**'

jobs:
  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          wget -q https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Validate YAML syntax
        run: |
          pip install --quiet yamllint
          echo "Validating YAML syntax..."
          find envs/ infrastructure/ argocd-appsets/ bootstrap/ \
            \( -name "*.yaml" -o -name "*.yml" \) 2>/dev/null \
            | xargs yamllint -d "{extends: relaxed, rules: {line-length: disable}}"
          echo "All YAML files valid"

      - name: Build and validate Kustomize overlays
        run: |
          FAILED=0
          while IFS= read -r kfile; do
            overlay=$(dirname "$kfile")
            echo "Building overlay: $overlay"
            kustomize build "$overlay" | kubeconform \
              -ignore-missing-schemas \
              -kubernetes-version 1.32.0 \
              -summary || FAILED=1
          done < <(find envs/ -name "kustomization.yaml" 2>/dev/null)
          if [ $FAILED -ne 0 ]; then exit 1; fi
          echo "Kustomize overlay validation complete"

      - name: Validate plain manifests with kubeconform
        run: |
          kubeconform \
            -ignore-missing-schemas \
            -kubernetes-version 1.32.0 \
            -summary \
            infrastructure/ argocd-appsets/ bootstrap/

      - name: Check Deployment best practices
        run: |
          while IFS= read -r file; do
            grep -q "imagePullPolicy" "$file" || echo "WARN: $file missing imagePullPolicy"
            grep -q "limits:" "$file"         || echo "WARN: $file missing resource limits"
            grep -q "livenessProbe" "$file"   || echo "WARN: $file missing livenessProbe"
            grep -q "readinessProbe" "$file"  || echo "WARN: $file missing readinessProbe"
          done < <(find envs/ -name "deployment.yaml" 2>/dev/null)

      - name: Generate summary
        if: always()
        run: |
          echo "## Manifest Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Path | Files |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          for dir in envs infrastructure argocd-appsets bootstrap; do
            count=$(find $dir -name "*.yaml" -o -name "*.yml" 2>/dev/null | wc -l | tr -d ' ')
            echo "| \`$dir/\` | $count |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validated with kubeconform (k8s 1.32) + kustomize build" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Manifest Validation Passed\n\nAll Kubernetes manifests validated.\n\n- YAML syntax OK\n- Kustomize overlays built and validated\n- kubeconform schema validation (k8s 1.32)\n\n**Ready to merge**'
            })
