# ARC Runner Scale Set — org-level runners for surfside-labs.
# Depends on infra-arc-config having applied the arc-github-app secret first.
# Targets ARM64 (Raspberry Pi 5) — no DinD, uses host Docker socket.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-arc-runners
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.14.0
    helm:
      valuesObject:
        githubConfigUrl: https://github.com/surfside-labs
        githubConfigSecret: arc-github-app
        minRunners: 1
        maxRunners: 4
        containerMode:
          type: kubernetes
          kubernetesModeWorkVolumeClaim:
            accessModes: ["ReadWriteOnce"]
            storageClassName: local-path
            resources:
              requests:
                storage: 5Gi
        template:
          spec:
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: "2"
                    memory: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
