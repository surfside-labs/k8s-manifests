apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw-https
  namespace: dev
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`openclaw.dev.ssl.local`) && PathPrefix(`/bridge`)
      priority: 20
      services:
        - name: openclaw
          port: 18790
    - kind: Rule
      match: Host(`openclaw.dev.ssl.local`)
      priority: 10
      services:
        - name: openclaw
          port: 18789
  tls:
    secretName: openclaw-dev-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openclaw-dev-tls
  namespace: dev
spec:
  secretName: openclaw-dev-tls
  issuerRef:
    name: ssl-local-ca
    kind: ClusterIssuer
  dnsNames:
    - openclaw.dev.ssl.local
