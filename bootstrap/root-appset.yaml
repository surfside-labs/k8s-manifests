# Bootstrap: Root Application — "App of Apps" entry point
# Apply once after ArgoCD is running:
#   kubectl apply -f bootstrap/root-appset.yaml
# ArgoCD then manages all ApplicationSets (and their child Applications) from Git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/surfside-labs/k8s-manifests
    targetRevision: main
    path: argocd-appsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
