apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: openclaw
          image: ghcr.io/surfside-labs/openclaw:latest
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
            - name: PORT_GATEWAY
              value: "18789"
            - name: PORT_BRIDGE
              value: "18790"
          envFrom:
            - secretRef:
                name: openclaw-secrets
          ports:
            - name: http
              containerPort: 18789
              protocol: TCP
            - name: bridge
              containerPort: 18790
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw/config
            - name: workspace
              mountPath: /home/node/.openclaw/workspace
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: openclaw-config
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-workspace
